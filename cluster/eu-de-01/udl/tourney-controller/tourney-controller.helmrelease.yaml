apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tourney-controller
  namespace: udl
spec:
  chartRef:
    kind: OCIRepository
    name: tourney-controller
    namespace: default
  interval: 10m
  targetNamespace: udl
  values:
    image:
      repository: ghcr.io/udl-tf/tourney-controller
      tag: "latest" # {"$imagepolicy": "flux-system:tourney-controller:tag"}
      pullPolicy: Always

    nameOverride: "tourney-controller"
    fullnameOverride: "tourney-controller"

    serviceAccount:
      create: true

    controllerConfig:
      namespace: "udl"
      pollInterval: 30s
      chartPath: oci://ghcr.io/udl-tf/charts/tf2chart:0.3.0
      matchStatuses:
        - 0        # Active matches to process
      matchCompletedStatuses:
        - 3        # Completed status for orphaned server cleanup
      divisionFilters:
        - "EU"
      defaultMap: tfdb_octagon_udl_v4
      hostNetwork: true
      notificationsEnabled: true
      notificationsLinkFormat: /matches/%d

    database:
      name: citadel_prod
      host: postgres.citadel.svc.cluster.local
      passwordKey: DB_PASSWORD
      existingSecret:
        name: postgres-creds  
        key: POSTGRES_PASSWORD
        userKey: POSTGRES_USER

    ports:
      game: "30000-30299"
      sourcetv: "30300-30599"
      client: "30600-30899"
      steam: "30900-31199"

    srcds:
      tickRate: 128
      maxPlayersOverride: 0
      staticToken: ""
      staticTokenSecret:
        name: ""
        key: ""
      passwordLength: 10
      rconLength: 46

    steam:
      apiKeySecret:
        name: "steam-api"
        key: "STEAM_WEB_API_KEY"
      appId: 440
      autoTokens: true
      tokenCleanup: true
      tokenMemoTemplate: "UDL Match %d Round %d"

    tf2Chart:
      values: {}
