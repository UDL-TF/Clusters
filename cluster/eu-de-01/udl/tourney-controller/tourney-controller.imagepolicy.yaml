apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: tourney-controller
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: tourney-controller
  filterTags:
    pattern: '^build-(?P<build_number>\d+)$'
    extract: '$build_number'
  policy:
    numerical:
      order: asc
