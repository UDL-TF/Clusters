apiVersion: apps/v1
kind: Deployment
metadata:
  name: yagpdb
  namespace: yagpdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yagpdb
  template:
    metadata:
      labels:
        app: yagpdb
    spec:
      containers:
        - name: yagpdb
          image: teyker/yagpdb:latest
          command:
            - "/app/yagpdb"
          args:
            - "-all"
            - "-pa"
            - "-exthttps=true"
            - "-https=false"
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - secretRef:
                name: yagpdb-secrets
          env:
            - name: YAGPDB_PQPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: cert-cache
              mountPath: /app/cert
            - name: soundboard
              mountPath: /app/soundboard
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: cert-cache
          hostPath:
            path: /mnt/yagpdb/cert
            type: DirectoryOrCreate
        - name: soundboard
          hostPath:
            path: /mnt/yagpdb/soundboard
            type: DirectoryOrCreate
